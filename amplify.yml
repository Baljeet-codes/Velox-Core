version: 1
frontend:
  phases:
    build:
      commands:
        - cd frontend && npm ci && npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
customRules:
  - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json|webp$)([^.]+$)/>'
    target: /index.html
    status: '200'
